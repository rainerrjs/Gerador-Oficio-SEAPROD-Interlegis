<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Ofício Interlegis</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #d9d6d1; padding: 20px; }
    .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; }
    h2 { color: #00305c; border-bottom: 2px solid #00305c; }
    h3 { color: #00305c; margin-top: 25px; }
    .info-box { border-left: 4px solid #00305c; padding: 15px; margin-bottom: 25px; }
    .box-borda { background: #fafafa; border: 1px solid #ccc; padding: 20px; border-radius: 6px; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .campo { display: flex; flex-direction: column; }
    label { font-weight: bold; }
    input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    .checkbox-item { margin-bottom: 10px; }
    .responsavel-entry { border-bottom: 1px dashed #ccc; padding-bottom: 15px; margin-bottom: 15px; }
    button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
    .btn-add { background: #00305c; color: white; padding: 10px 15px; }
    .btn-remove { background: #b00020; color: white; padding: 8px 12px; margin-top: 10px; }
    .btn-submit { background: #00824a; color: white; padding: 15px; width: 100%; font-size: 1.1em; }
    .secao-escondida { display: none; margin-top: 15px; padding-left: 20px; border-left: 2px solid #ddd; }
  </style>
</head>

<body>

<div class="container">
<form id="meuFormulario">

<h2>Solicitação de Produtos e Serviços Interlegis</h2>

<h3>1) Designação de Responsáveis Técnicos da Casa:</h3>

<div class="box-borda">

  <div class="checkbox-item">
    <input type="checkbox"
           id="checkAddResp"
           onclick="toggleSecao('checkAddResp','secAddResp')">
    Desejo designar responsáveis técnicos
  </div>

  <div id="secAddResp" class="secao-escondida">

    <div id="containerResponsaveis">

      <!-- 🔹 RESPONSÁVEL 1 (MODELO) -->
      <div class="responsavel-entry">

        <div class="grid">
          <div class="campo">
            <label>Nome Completo:</label>
            <input type="text" class="rep-nome">
          </div>

          <div class="campo">
            <label>CPF:</label>
            <input type="text" class="rep-cpf">
          </div>

          <div class="campo">
            <label>E-mail:</label>
            <input type="email" class="rep-email">
          </div>

          <div class="campo">
            <label>Telefone/WhatsApp:</label>
            <input type="text" class="rep-tel">
          </div>

          <div class="campo">
            <label>Vínculo:</label>
            <select class="rep-vinculo">
              <option value="(x) Efetivo/Concursado">Efetivo/Concursado</option>
              <option value="(x) Comissionado">Comissionado</option>
              <option value="(x) Terceirizado">Terceirizado</option>
            </select>
          </div>
        </div>

        <!-- ✅ BOTÃO NO LOCAL CORRETO -->
        <button type="button"
                class="btn-remove"
                onclick="removerResponsavel(this)">
          - Remover Responsável
        </button>

      </div>
      <!-- 🔹 FIM RESPONSÁVEL -->

    </div>

    <button type="button"
            class="btn-add"
            onclick="addResponsavel()">
      + Adicionar Responsável
    </button>

  </div>

</div>

<button type="submit" class="btn-submit">Gerar Ofício PDF</button>

</form>
</div>

<script src="script.js"></script>

</body>
</html>
``
